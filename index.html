<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunflowers for Faima</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .message {
            font-size: 3em;
            color: #333;
            font-weight: bold;
            margin-bottom: 40px;
            animation: fadeInDown 2s ease-in-out;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .flowers-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            animation: fadeInUp 2s ease-in-out;
        }

        .sunflower {
            position: relative;
            width: 150px;
            height: 250px;
            animation: sway 3s ease-in-out infinite;
        }

        .sunflower:nth-child(2) {
            animation-delay: 0.5s;
        }

        .sunflower:nth-child(3) {
            animation-delay: 1s;
        }

        /* Stem */
        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 8px;
            height: 140px;
            background: linear-gradient(to top, #2d5016, #4a8c2a);
            transform: translateX(-50%);
            border-radius: 4px;
        }

        /* Leaves */
        .leaf {
            position: absolute;
            bottom: 40px;
            width: 25px;
            height: 50px;
            background: #2d5016;
            border-radius: 50% 50% 50% 0;
            opacity: 0.8;
        }

        .leaf-left {
            left: 20px;
            transform: rotate(-45deg);
            animation: leafSway 2.5s ease-in-out infinite;
        }

        .leaf-right {
            right: 20px;
            transform: rotate(45deg);
            animation: leafSway 2.5s ease-in-out infinite 0.3s;
        }

        /* Flower head */
        .flower-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            animation: spin 20s linear infinite;
        }

        /* Center of flower */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at 35% 35%, #f4d03f, #daa520);
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Petals */
        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25px;
            height: 45px;
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            border-radius: 50% 50% 50% 0;
            transform-origin: 12px 50px;
        }

        .petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); }
        .petal:nth-child(2) { transform: translate(-50%, -50%) rotate(30deg); }
        .petal:nth-child(3) { transform: translate(-50%, -50%) rotate(60deg); }
        .petal:nth-child(4) { transform: translate(-50%, -50%) rotate(90deg); }
        .petal:nth-child(5) { transform: translate(-50%, -50%) rotate(120deg); }
        .petal:nth-child(6) { transform: translate(-50%, -50%) rotate(150deg); }
        .petal:nth-child(7) { transform: translate(-50%, -50%) rotate(180deg); }
        .petal:nth-child(8) { transform: translate(-50%, -50%) rotate(210deg); }
        .petal:nth-child(9) { transform: translate(-50%, -50%) rotate(240deg); }
        .petal:nth-child(10) { transform: translate(-50%, -50%) rotate(270deg); }
        .petal:nth-child(11) { transform: translate(-50%, -50%) rotate(300deg); }
        .petal:nth-child(12) { transform: translate(-50%, -50%) rotate(330deg); }

        /* Animations */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
        }

        @keyframes leafSway {
            0%, 100% { transform: rotate(-45deg); }
            50% { transform: rotate(-35deg); }
        }

        @keyframes spin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating clouds */
        .cloud {
            position: fixed;
            color: white;
            font-size: 3em;
            opacity: 0.6;
            animation: float 20s infinite linear;
        }

        .cloud:nth-child(1) {
            top: 10%;
            left: -50px;
            animation-duration: 25s;
        }

        .cloud:nth-child(2) {
            top: 20%;
            right: -50px;
            animation-duration: 35s;
            animation-direction: reverse;
        }

        .cloud:nth-child(3) {
            top: 80%;
            left: -50px;
            animation-duration: 30s;
        }

        @keyframes float {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(100vw);
            }
        }

        .decorative-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em;
            color: #666;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="cloud">☁️</div>
    <div class="cloud">☁️</div>
    <div class="cloud">☁️</div>

    <div class="container">
        <div class="message">From Ebrahim to My Faima 🌻</div>
        
        <div class="flowers-container">
            <!-- Sunflower 1 -->
            <div class="sunflower">
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf leaf-left"></div>
                <div class="leaf leaf-right"></div>
            </div>

            <!-- Sunflower 2 -->
            <div class="sunflower">
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf leaf-left"></div>
                <div class="leaf leaf-right"></div>
            </div>

            <!-- Sunflower 3 -->
            <div class="sunflower">
                <div class="flower-head">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf leaf-left"></div>
                <div class="leaf leaf-right"></div>
            </div>
        </div>
        
        <div class="decorative-text">✨ With Love ✨</div>
    </div>
</body>
</html>
